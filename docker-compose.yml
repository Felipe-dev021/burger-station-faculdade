services:
  menu-service:
    build:
      context: ./menu-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    env_file:
      - .env

  order-service:
    build:
      context: ./order-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    environment:
      - VITE_MENU_URL=http://localhost:3002
      - VITE_ORDER_URL=http://localhost:3001
    depends_on:
      - menu-service
      - order-service